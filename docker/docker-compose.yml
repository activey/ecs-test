version: '3.8'
services:
  flyway:
    image: flyway/flyway
    command: -url=jdbc:postgresql://db:5432/test -schemas=test -user=test -password=test -connectRetries=60 migrate
    volumes:
      - ./migration:/flyway/sql
    depends_on:
      - db
  db:
    image: postgres:14.1-alpine
    restart: always
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
    ports:
      - '5432:5432'
    volumes:
      - db:/var/lib/postgresql/data
volumes:
  db:
    driver: local